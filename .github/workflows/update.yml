name: Update Latest PDF Link

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes automatically
  workflow_dispatch: # Allows you to click a button to run it manually

permissions:
  contents: write

jobs:
  update-redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest file and update HTML
        env:
          API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          FOLDER_ID: '1ejDfIQQ31T3ZUmIdQcB-b4Yxl152uZKA'
        run: |
          # Query Google Drive API for the newest PDF in your specific folder
          RESPONSE=$(curl -s "https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+trashed=false+and+mimeType='application/pdf'&orderBy=modifiedTime+desc&pageSize=1&key=${API_KEY}")
          
          # Extract the File ID
          FILE_ID=$(echo $RESPONSE | jq -r '.files[0].id')
          
          if [ "$FILE_ID" != "null" ] && [ -n "$FILE_ID" ]; then
            echo "Found file ID: $FILE_ID"
            
            # Create/Overwrite index.html with an automatic redirect
            cat <<EOF > index.html
            <!DOCTYPE html>
            <html>
              <head>
                <meta http-equiv="refresh" content="0; url=https://drive.google.com/file/d/${FILE_ID}/view">
                <title>Redirecting to latest Assemblea Ordinaria...</title>
              </head>
              <body>
                <p>Redirecting... If you are not redirected automatically, <a href="https://drive.google.com/file/d/${FILE_ID}/view">click here</a>.</p>
              </body>
            </html>
            EOF
          else
            echo "No file found or API error. Check if the folder is empty or API key is correct."
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          # Only commit if a NEW pdf was uploaded and index.html actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Updated PDF link" && git push)
