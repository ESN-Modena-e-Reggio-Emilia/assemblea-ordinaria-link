name: Update Latest PDF Link

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest file and generate HTML
        env:
          API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          FOLDER_ID: "1ejDfIQQ31T3ZUmIdQcB-b4Yxl152uZKA"
        run: |
          mkdir public

          RESPONSE=$(curl -s -G \
            --data-urlencode "q='${FOLDER_ID}' in parents and trashed=false and mimeType='application/pdf'" \
            --data-urlencode "orderBy=modifiedTime desc" \
            --data-urlencode "pageSize=1" \
            --data-urlencode "includeItemsFromAllDrives=true" \
            --data-urlencode "supportsAllDrives=true" \
            --data-urlencode "key=${API_KEY}" \
            "https://www.googleapis.com/drive/v3/files")

          FILE_ID=$(echo $RESPONSE | jq -r '.files[0].id')

          if [ "$FILE_ID" != "null" ] && [ -n "$FILE_ID" ]; then
            echo "Found file ID: $FILE_ID"
            
            # HTML formattato con ESN Brand Identity
            HTML="<!DOCTYPE html>
            <html lang='it'>
            <head>
                <meta charset='UTF-8'>
                <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                <meta http-equiv='Cache-Control' content='no-cache, no-store, must-revalidate'>
                <meta http-equiv='refresh' content='0; url=https://drive.google.com/file/d/${FILE_ID}/view'>
                <title>Convocazione Assemblea - ESN Modena e Reggio Emilia</title>
                <!-- Importiamo il font Lato dal VIM di ESN -->
                <link href='https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap' rel='stylesheet'>
                <style>
                    :root {
                        --bg-color: #ffffff;
                        --text-color: #333333;
                        --title-color: #2e3192; /* ESN Dark Blue */
                        --link-color: #00aeef;  /* ESN Cyan */
                        --spinner-bg: #f3f3f3;
                    }

                    @media (prefers-color-scheme: dark) {
                        :root {
                            --bg-color: #121212;
                            --text-color: #eeeeee;
                            --title-color: #ffffff;
                            --spinner-bg: #333333;
                        }
                    }

                    body {
                        font-family: 'Lato', sans-serif;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        height: 100vh;
                        margin: 0;
                        background-color: var(--bg-color);
                        color: var(--text-color);
                        text-align: center;
                        padding: 20px;
                        transition: background-color 0.3s ease;
                    }
                    img {
                        max-width: 300px;
                        margin-bottom: 25px;
                    }
                    h1 {
                        color: var(--title-color);
                        font-size: 26px;
                        margin-bottom: 5px;
                    }
                    p {
                        font-size: 16px;
                    }
                    a {
                        color: var(--link-color);
                        text-decoration: none;
                        font-weight: 700;
                    }
                    .spinner {
                        border: 4px solid var(--spinner-bg);
                        border-top: 4px solid #ec008c; /* ESN Magenta */
                        border-radius: 50%;
                        width: 40px;
                        height: 40px;
                        animation: spin 1s linear infinite;
                        margin: 20px auto;
                    }
                    @keyframes spin {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }
                    }
                </style>
            </head>
            <body>
                <picture>
                    <source srcset='https://more.esn.it/sites/esnmodena.it/files/web-it-mode-esn-colour-white.png' media='(prefers-color-scheme: dark)'>
                    <img src='https://more.esn.it/sites/esnmodena.it/files/web-it-mode-esn-colour-black.png' alt='Logo ESN'>
                </picture>
                <h1>Assemblea Ordinaria</h1>
                <p>Reindirizzamento all'ultima convocazione in corso...</p>
                <div class='spinner'></div>
                <p style='font-size: 14px; margin-top: 15px;'>
                    Se non vieni reindirizzato automaticamente, <a href='https://drive.google.com/file/d/${FILE_ID}/view'>clicca qui</a>.
                </p>
            </body>
            </html>"
            
            # Scriviamo la variabile HTML dentro al file
            echo "$HTML" > public/index.html
            
          else
            echo "No file found or API error."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
