name: Update Latest PDF Link

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest file and generate HTML
        env:
          API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          FOLDER_ID: "1ejDfIQQ31T3ZUmIdQcB-b4Yxl152uZKA"
        run: |
          mkdir public

          RESPONSE=$(curl -s -G \
            --data-urlencode "q='${FOLDER_ID}' in parents and trashed=false and mimeType='application/pdf'" \
            --data-urlencode "orderBy=modifiedTime desc" \
            --data-urlencode "pageSize=1" \
            --data-urlencode "includeItemsFromAllDrives=true" \
            --data-urlencode "supportsAllDrives=true" \
            --data-urlencode "key=${API_KEY}" \
            "https://www.googleapis.com/drive/v3/files")

          FILE_ID=$(echo $RESPONSE | jq -r '.files[0].id')

          # QUI C'ERA L'ERRORE: "if[" corretto in "if ["
          if [ "$FILE_ID" != "null" ] &&[ -n "$FILE_ID" ]; then
            echo "Found file ID: $FILE_ID"
            
            echo "<!DOCTYPE html><html><head><meta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\"><meta http-equiv=\"refresh\" content=\"0; url=https://drive.google.com/file/d/${FILE_ID}/view\"><title>Redirecting...</title></head><body><p>Redirecting... If you are not redirected automatically, <a href=\"https://drive.google.com/file/d/${FILE_ID}/view\">click here</a>.</p></body></html>" > public/index.html
            
          else
            echo "No file found or API error."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
