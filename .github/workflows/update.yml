name: Update Latest PDF Link

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest file and update HTML
        env:
          API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          FOLDER_ID: '1ejDfIQQ31T3ZUmIdQcB-b4Yxl152uZKA'
        run: |
          # Query Google Drive API using proper URL encoding and Shared Drive support
          RESPONSE=$(curl -s -G \
            --data-urlencode "q='${FOLDER_ID}' in parents and trashed=false and mimeType='application/pdf'" \
            --data-urlencode "orderBy=modifiedTime desc" \
            --data-urlencode "pageSize=1" \
            --data-urlencode "includeItemsFromAllDrives=true" \
            --data-urlencode "supportsAllDrives=true" \
            --data-urlencode "key=${API_KEY}" \
            "https://www.googleapis.com/drive/v3/files")
          
          # Extract the File ID
          FILE_ID=$(echo $RESPONSE | jq -r '.files[0].id')
          
          if [ "$FILE_ID" != "null" ] && [ -n "$FILE_ID" ]; then
            echo "Found file ID: $FILE_ID"
            
            # Create index.html on a single line
            echo "<!DOCTYPE html><html><head><meta http-equiv=\"refresh\" content=\"0; url=https://drive.google.com/file/d/${FILE_ID}/view\"><title>Redirecting...</title></head><body><p>Redirecting... If you are not redirected automatically, <a href=\"https://drive.google.com/file/d/${FILE_ID}/view\">click here</a>.</p></body></html>" > index.html
            
          else
            echo "No file found or API error."
            echo "API Response was: $RESPONSE"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Updated PDF link" && git push)
